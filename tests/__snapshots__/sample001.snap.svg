15.8277936055714" height="26.907249129471353" fill="rgba(20, 184, 166, 0.55)" stroke="#0f766e" stroke-width="0.03159"/></g><g><rect data-type="rect" data-label="IO" data-x="2.267" data-y="-5.6" x="298.309591642925" y="424.1722063944286" width="26.907249129471325" height="15.8277936055714" fill="rgba(20, 184, 166, 0.55)" stroke="#0f766e" stroke-width="0.03159"/></g><g><rect data-type="rect" data-label="IO" data-x="-5.6" data-y="2.267" x="54.814814814814824" y="169.59797404241846" width="15.827793605571372" height="26.907249129471353" fill="rgba(20, 184, 166, 0.55)" stroke="#0f766e" stroke-width="0.03159"/></g><g><rect data-type="rect" data-label="IO" data-x="4.534" data-y="5.6" x="370.0728078505856" y="69.62962962962963" width="26.90724912947138" height="15.827793605571372" fill="rgba(20, 184, 166, 0.55)" stroke="#0f766e" stroke-width="0.03159"/></g><g><rect data-type="rect" data-label="IO" data-x="5.6" data-y="4.534" x="409.35739157961376" y="97.83475783475781" width="15.8277936055714" height="26.907249129471353" fill="rgba(20, 184, 166, 0.55)" stroke="#0f766e" stroke-width="0.03159"/></g><g><rect data-type="rect" data-label="IO" data-x="4.534" data-y="-5.6" x="370.0728078505856" y="424.1722063944286" width="26.90724912947138" height="15.8277936055714" fill="rgba(20, 184, 166, 0.55)" stroke="#0f766e" stroke-width="0.03159"/></g><g><rect data-type="rect" data-label="IO" data-x="-5.6" data-y="4.534" x="54.814814814814824" y="97.83475783475781" width="15.827793605571372" height="26.907249129471353" fill="rgba(20, 184, 166, 0.55)" stroke="#0f766e" stroke-width="0.03159"/></g><g><rect data-type="rect" data-label="MISSING" data-x="-0.4" data-y="1.2" x="221.63975941753716" y="211.13010446343776" width="11.396011396011403" height="11.396011396011403" fill="rgba(255,255,255,0)" stroke="#dc2626" stroke-width="0.03159"/></g><g><rect data-type="rect" data-label="MISSING" data-x="-0.4" data-y="-0.4" x="221.63975941753716" y="261.77904400126624" width="11.396011396011403" height="11.396011396011374" fill="rgba(255,255,255,0)" stroke="#dc2626" stroke-width="0.03159"/></g><text data-type="text" data-label="Partial BGA bottom: 2 missing pads" data-x="0" data-y="6.786" x="240" y="40" fill="#334155" font-size="16.666666666666668" font-family="sans-serif" text-anchor="middle" dominant-baseline="text-after-edge">Partial BGA bottom: 2 missing pads</text><g id="crosshair" style="display: none"><line id="crosshair-h" y1="0" y2="480" stroke="#666" stroke-width="0.5"/><line id="crosshair-v" x1="0" x2="480" stroke="#666" stroke-width="0.5"/><text id="coordinates" font-family="monospace" font-size="12" fill="#666"></text></g><script><![CDATA[
              document.currentScript.parentElement.addEventListener('mousemove', (e) => {
                const svg = e.currentTarget;
                const rect = svg.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                const crosshair = svg.getElementById('crosshair');
                const h = svg.getElementById('crosshair-h');
                const v = svg.getElementById('crosshair-v');
                const coords = svg.getElementById('coordinates');
                
                crosshair.style.display = 'block';
                h.setAttribute('x1', '0');
                h.setAttribute('x2', '480');
                h.setAttribute('y1', y);
                h.setAttribute('y2', y);
                v.setAttribute('x1', x);
                v.setAttribute('x2', x);
                v.setAttribute('y1', '0');
                v.setAttribute('y2', '480');

                // Calculate real coordinates using inverse transformation
                const matrix = {"a":31.65558721114277,"c":0,"e":240,"b":0,"d":-31.65558721114277,"f":254.8148148148148};
                // Manually invert and apply the affine transform
                // Since we only use translate and scale, we can directly compute:
                // x' = (x - tx) / sx
                // y' = (y - ty) / sy
                const sx = matrix.a;
                const sy = matrix.d;
                const tx = matrix.e; 
                const ty = matrix.f;
                const realPoint = {
                  x: (x - tx) / sx,
                  y: (y - ty) / sy // Flip y back since we used negative scale
                }
                
                coords.textContent = `(${realPoint.x.toFixed(2)}, ${realPoint.y.toFixed(2)})`;
                coords.setAttribute('x', (x + 5).toString());
                coords.setAttribute('y', (y - 5).toString());
              });
              document.currentScript.parentElement.addEventListener('mouseleave', () => {
                document.currentScript.parentElement.getElementById('crosshair').style.display = 'none';
              });
            ]]></script></svg>